<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 560" width="100%" role="img">
  <title>AI 导入故障转移时序图</title>
  <desc>客户端经网关到 AI 代理，熔断器依次尝试供应商 A/B/C，均失败时走模板兜底，全程含重试、超时与熔断；任一层失败自动降级，最终绝不抛给用户崩溃。</desc>
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- title -->
  <text x="20" y="22" font-family="system-ui,sans-serif" font-size="13" font-weight="600" fill="#444441">AI 导入故障转移时序（重试 / 超时 / 熔断 / 兜底）</text>

  <!-- lifeline heads -->
  <g font-family="system-ui,sans-serif" font-size="11" fill="#444441" text-anchor="middle">
    <rect x="30"  y="34" width="80"  height="26" rx="6" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/><text x="70"  y="51" dominant-baseline="central">客户端</text>
    <rect x="120" y="34" width="80"  height="26" rx="6" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/><text x="160" y="51" dominant-baseline="central">API 网关</text>
    <rect x="225" y="34" width="80"  height="26" rx="6" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/><text x="265" y="51" dominant-baseline="central">AI 代理</text>
    <rect x="330" y="34" width="80"  height="26" rx="6" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/><text x="370" y="51" dominant-baseline="central">熔断器</text>
    <rect x="440" y="34" width="100" height="26" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/><text x="490" y="51" dominant-baseline="central">供应商 A→B→C</text>
    <rect x="575" y="34" width="90"  height="26" rx="6" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/><text x="620" y="51" dominant-baseline="central">模板兜底</text>
  </g>

  <!-- lifelines -->
  <g stroke="#B4B2A9" stroke-width="0.8" stroke-dasharray="4 3">
    <line x1="70"  y1="60" x2="70"  y2="515"/>
    <line x1="160" y1="60" x2="160" y2="515"/>
    <line x1="265" y1="60" x2="265" y2="515"/>
    <line x1="370" y1="60" x2="370" y2="515"/>
    <line x1="490" y1="60" x2="490" y2="515"/>
    <line x1="620" y1="60" x2="620" y2="515"/>
  </g>

  <!-- messages: normal (gray) -->
  <g fill="none" stroke="#5F5E5A" stroke-width="1.3">
    <path d="M70,92 L160,92"   marker-end="url(#ar)"/>
    <path d="M160,122 L265,122" marker-end="url(#ar)"/>
    <path d="M265,152 L370,152" marker-end="url(#ar)"/>
    <path d="M370,182 L490,182" marker-end="url(#ar)"/>
  </g>
  <!-- messages: failure / failover (pink) -->
  <g fill="none" stroke="#993556" stroke-width="1.3">
    <path d="M490,207 L370,207" marker-end="url(#ar)"/>
    <path d="M370,262 L490,262" marker-end="url(#ar)"/>
    <path d="M490,287 L370,287" marker-end="url(#ar)"/>
    <path d="M370,317 L490,317" marker-end="url(#ar)"/>
    <path d="M490,342 L370,342" marker-end="url(#ar)"/>
    <path d="M370,372 L620,372" marker-end="url(#ar)"/>
  </g>
  <!-- messages: success return (green) -->
  <g fill="none" stroke="#2E7D32" stroke-width="1.3">
    <path d="M620,402 L370,402" marker-end="url(#ar)"/>
    <path d="M370,432 L265,432" marker-end="url(#ar)"/>
    <path d="M265,462 L160,462" marker-end="url(#ar)"/>
    <path d="M160,492 L70,492"  marker-end="url(#ar)"/>
  </g>

  <!-- self loop on breaker: retry -->
  <g fill="none" stroke="#993556" stroke-width="1.3">
    <path d="M370,225 L398,225 L398,245 L370,245" marker-end="url(#ar)"/>
  </g>

  <!-- labels -->
  <g font-family="system-ui,sans-serif" font-size="10.5" fill="#5F5E5A" text-anchor="middle">
    <text x="115" y="88">1 POST /ai/import</text>
    <text x="212" y="118">2 转发(鉴权+限流)</text>
    <text x="317" y="148">3 routeAI(): 选健康分最高 A</text>
    <text x="430" y="178">4 call A [超时/15s]</text>
    <text x="430" y="203">5 408/429/5xx 失败</text>
    <text x="430" y="258">7 故障转移 call B</text>
    <text x="430" y="283">8 失败</text>
    <text x="430" y="313">9 故障转移 call C</text>
    <text x="430" y="338">10 失败 / 熔断打开</text>
    <text x="495" y="368">11 最后兜底</text>
    <text x="495" y="398">12 规则解析课程</text>
    <text x="317" y="428">13 200 {courses}</text>
    <text x="212" y="458">14 200 友好结果</text>
    <text x="115" y="488">15 返回用户</text>
  </g>
  <text x="395" y="242" font-family="system-ui,sans-serif" font-size="10" fill="#993556" text-anchor="start">6 retry 指数退避×N 仍失败</text>

  <!-- note: breaker open short-circuit -->
  <g font-family="system-ui,sans-serif" font-size="9.5" fill="#993556">
    <text x="20" y="540">注：熔断打开时，后续供应商调用被短路，直接跳至「模板兜底」，不浪费连接。</text>
  </g>
</svg>
