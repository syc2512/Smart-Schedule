<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 700" width="100%" role="img">
  <title>智能课程表 Pro 后端分层架构图</title>
  <desc>客户端经边缘层(WAF/API网关/负载均衡)进入无状态服务层，经基础设施(Redis/MQ/对象存储)与数据层(PostgreSQL主从)，AI代理通过熔断器串联多供应商并故障转移至模板兜底；可观测性贯穿全局。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- bands -->
  <rect x="40" y="120" width="600" height="72" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="40" y="212" width="600" height="72" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="40" y="304" width="390" height="70" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="450" y="304" width="190" height="372" rx="12" fill="#FBEAF0" stroke="#ED93B1" stroke-width="0.5"/>
  <rect x="40" y="386" width="390" height="126" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <rect x="40" y="524" width="390" height="152" rx="12" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>

  <!-- band labels -->
  <text x="52" y="134" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">边缘层</text>
  <text x="52" y="226" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">服务层（无状态·可水平扩展）</text>
  <text x="52" y="318" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">基础设施</text>
  <text x="462" y="318" font-family="system-ui,sans-serif" font-size="11" fill="#993556">AI 供应商故障转移（重点）</text>
  <text x="52" y="400" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">数据层</text>
  <text x="52" y="538" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A">可观测性</text>

  <!-- clients -->
  <rect x="60" y="52" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="135" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">浏览器 / 移动端</text>

  <rect x="265" y="52" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="340" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">静态资源 CDN</text>

  <rect x="470" y="52" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">第三方 / 集成</text>

  <!-- edge boxes -->
  <rect x="60" y="140" width="160" height="44" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="140" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">WAF / DDoS</text>

  <rect x="260" y="140" width="180" height="44" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="350" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">API 网关 APISIX</text>
  <text x="350" y="174" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#5F5E5A" dominant-baseline="central">鉴权 · 限流 · 路由</text>

  <rect x="470" y="140" width="150" height="44" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="162" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">负载均衡 L7</text>

  <!-- service boxes -->
  <rect x="60" y="232" width="160" height="48" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="140" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">认证服务 Auth</text>

  <rect x="255" y="232" width="180" height="48" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="345" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">课表服务 Timetable</text>

  <rect x="470" y="232" width="150" height="48" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="545" y="256" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="500" fill="#444441" dominant-baseline="central">AI 代理服务</text>

  <!-- infra boxes -->
  <rect x="52" y="324" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="107" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">Redis 缓存</text>

  <rect x="172" y="324" width="110" height="42" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="227" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">消息队列 MQ</text>

  <rect x="292" y="324" width="120" height="42" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="352" y="345" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">对象存储 OSS</text>

  <!-- AI chain (pink) -->
  <rect x="462" y="326" width="166" height="40" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="545" y="346" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#72243E" dominant-baseline="central">熔断器 Circuit Breaker</text>

  <rect x="462" y="378" width="166" height="40" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="545" y="398" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#72243E" dominant-baseline="central">Provider A (OpenAI兼容)</text>

  <rect x="462" y="430" width="166" height="40" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="545" y="450" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#72243E" dominant-baseline="central">Provider B (Azure/自建)</text>

  <rect x="462" y="482" width="166" height="40" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="545" y="502" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#72243E" dominant-baseline="central">Provider C (本地模型)</text>

  <rect x="462" y="534" width="166" height="40" rx="8" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
  <text x="545" y="554" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="500" fill="#72243E" dominant-baseline="central">模板解析兜底</text>

  <text x="545" y="600" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#993556" dominant-baseline="central">失败逐级故障转移</text>

  <!-- data boxes -->
  <rect x="52" y="404" width="150" height="46" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="127" y="427" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">PgBouncer 连接池</text>

  <rect x="220" y="404" width="200" height="46" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="320" y="427" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">PostgreSQL 主库（写）</text>

  <rect x="220" y="458" width="200" height="44" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="320" y="480" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">PostgreSQL 只读副本（读）</text>

  <!-- observability boxes -->
  <rect x="52" y="544" width="170" height="46" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="137" y="567" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">Prometheus + Grafana</text>

  <rect x="232" y="544" width="178" height="46" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="321" y="567" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">Loki / ELK 日志</text>

  <rect x="52" y="606" width="170" height="46" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="137" y="629" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">OpenTelemetry 链路</text>

  <rect x="232" y="606" width="178" height="46" rx="8" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="321" y="629" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#444441" dominant-baseline="central">AlertManager 告警</text>

  <!-- connectors (gray) -->
  <g fill="none" stroke="#5F5E5A" stroke-width="1.5">
    <path d="M135,96 L140,140" marker-end="url(#arrow)"/>
    <path d="M340,96 L350,140" marker-end="url(#arrow)"/>
    <path d="M545,96 L545,140" marker-end="url(#arrow)"/>
    <path d="M220,162 L260,162" marker-end="url(#arrow)"/>
    <path d="M440,162 L470,162" marker-end="url(#arrow)"/>
    <path d="M500,184 L140,232" marker-end="url(#arrow)"/>
    <path d="M545,184 L345,232" marker-end="url(#arrow)"/>
    <path d="M560,184 L545,232" marker-end="url(#arrow)"/>
    <path d="M140,280 L107,324" marker-end="url(#arrow)"/>
    <path d="M345,280 L227,324" marker-end="url(#arrow)"/>
    <path d="M545,280 L352,324" marker-end="url(#arrow)"/>
    <path d="M140,280 L127,404" marker-end="url(#arrow)"/>
    <path d="M345,280 L320,404" marker-end="url(#arrow)"/>
    <path d="M545,280 L545,326" marker-end="url(#arrow)"/>
  </g>

  <!-- AI failover chain (pink) -->
  <g fill="none" stroke="#993556" stroke-width="1.5">
    <path d="M545,366 L545,378" marker-end="url(#arrow)"/>
    <path d="M545,418 L545,430" marker-end="url(#arrow)"/>
    <path d="M545,470 L545,482" marker-end="url(#arrow)"/>
    <path d="M545,522 L545,534" marker-end="url(#arrow)"/>
  </g>

  <!-- observability dashed leaders (tertiary) -->
  <g fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 3">
    <path d="M300,284 L240,544" marker-end="url(#arrow)"/>
    <path d="M320,512 L320,544" marker-end="url(#arrow)"/>
    <path d="M450,520 L300,606" marker-end="url(#arrow)"/>
  </g>
</svg>
